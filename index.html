<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>ремонт техники</title>
  </head>
  <body>
    <header>
      <img src="/2_services-software_768/burger.png" alt="menu" />
      <img src="/2_services-software_768/divider.svg" alt="divider" />
      <img src="/2_services-software_768/Group.svg" alt="Group" />
      <img src="/2_services-software_768/call.svg" alt="call" />
      <img src="/2_services-software_768/chat.svg" alt="chat" />
      <img src="/2_services-software_768/profile.svg" alt="profile" />
      <img src="/2_services-software_768/divider.svg" alt="divider" />

      <div class="repair">
        <p>Оставить заявку</p>
        <img
          class="repair__img"
          src="/2_services-software_768/repair.svg"
          alt="repair"
        />
      </div>
      <div class="checkstatus">
        <p>Статус ремонта</p>
        <img
          class="checkstatus__img"
          src="/2_services-software_768/checkstatus.svg"
          alt="checkstatus"
        />
      </div>
    </header>
    <main>
      <h1>
        <img src="/2_services-software_768/highlight.svg" alt="highlight" />
        Услуги и сервисы
      </h1>
      <div class="1-slide">
        <p>Ремонтируемые бренды</p>
      </div>
      <div class="2-slide">
        <p>Ремонтируемые устройства</p>
      </div>
      <div class="3-slide">
        <p>Цены на услуги</p>
      </div>
      <div class="4-slide">
        <p>Адреса сервисных центров</p>
      </div>
      <div class="5-slide">
        <p>Специальные цены</p>
      </div>
    </main>
  </body>
</html>
